<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign In</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="shell topbar">
        <a class="brand" href="/">
          <span class="brand-mark">QA</span>
          <span>Nicks Testing Portal</span>
        </a>
        <nav aria-label="Primary">
          <a class="auth-only is-hidden" href="/">Home</a>
          <a class="auth-only is-hidden" href="/todos">Tasks</a>
          <a class="auth-only is-hidden" href="/profile">Profile</a>
          <a class="nav-button" href="/sign-in" data-testid="header-login">Log in</a>
          <button class="nav-button is-hidden" data-testid="header-logout" data-logout>Log out</button>
        </nav>
      </div>
    </header>
    <main class="shell">
      <section class="panel">
        <h1>Sign in</h1>
        <form aria-label="Sign in" data-testid="sign-in-form" novalidate>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required />
            <span class="field-error" data-testid="email-error"></span>
          </label>
          <label>
            Password
            <input name="password" type="password" autocomplete="current-password" minlength="8" required />
            <span class="field-error" data-testid="password-error"></span>
          </label>
          <button>Sign in</button>
          <p role="status"></p>
        </form>
        <div class="hint" aria-label="Sample users">
          <p>Sample users</p>
          <ul data-testid="sample-users"></ul>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
