<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="shell topbar">
        <a class="brand" href="/">
          <span class="brand-mark">NTP</span>
          <span>Nicks Testing Portal</span>
        </a>
        <nav aria-label="Primary">
          <a class="auth-only is-hidden" href="/">Home</a>
          <a class="auth-only is-hidden" href="/todos">Tasks</a>
          <a class="auth-only is-hidden" href="/profile">Profile</a>
          <a class="nav-button" href="/sign-in" data-testid="header-login">Log in</a>
          <button class="nav-button is-hidden" data-testid="header-logout" data-logout>Log out</button>
        </nav>
      </div>
    </header>
    <main class="shell">
      <section class="panel">
        <h1>Profile</h1>
        <p data-testid="profile-session">Not signed in.</p>
        <button data-testid="load-profile">Load profile</button>
        <p role="status"></p>
        <dl>
          <dt>Name</dt>
          <dd data-testid="profile-name"></dd>
          <dt>Email</dt>
          <dd data-testid="profile-email"></dd>
          <dt>Role</dt>
          <dd data-testid="profile-role"></dd>
          <dt>Team</dt>
          <dd data-testid="profile-team"></dd>
        </dl>
        <form aria-label="Edit profile" data-testid="profile-form">
          <h2>Account settings</h2>
          <label>
            Display name
            <input name="displayName" />
          </label>
          <label>
            Preferred team
            <select name="preferredTeam">
              <option>Quality Platform</option>
              <option>Developer Experience</option>
              <option>Analytics</option>
            </select>
          </label>
          <label>
            Email updates
            <select name="emailUpdates">
              <option>Daily digest</option>
              <option>Weekly summary</option>
              <option>Critical alerts only</option>
            </select>
          </label>
          <button>Save changes</button>
        </form>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
