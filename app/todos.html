<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Team Tasks</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="shell topbar">
        <a class="brand" href="/">
          <span class="brand-mark">NTP</span>
          <span>Nicks Testing Portal</span>
        </a>
        <nav aria-label="Primary">
          <a class="auth-only is-hidden" href="/">Home</a>
          <a class="auth-only is-hidden" href="/todos">Tasks</a>
          <a class="auth-only is-hidden" href="/profile">Profile</a>
          <a class="nav-button" href="/sign-in" data-testid="header-login">Log in</a>
          <button class="nav-button is-hidden" data-testid="header-logout" data-logout>Log out</button>
        </nav>
      </div>
    </header>
    <main class="shell">
      <section class="panel">
        <h1>Team Tasks</h1>
        <form aria-label="Add a task" data-testid="todo-form">
          <label>
            Task title
            <input name="task" placeholder="Write a task" />
          </label>
          <label>
            Assignee
            <select name="assignee" data-testid="task-assignee"></select>
          </label>
          <label>
            Priority
            <select name="priority">
              <option>Medium</option>
              <option>High</option>
              <option>Low</option>
            </select>
          </label>
          <label>
            Due date
            <input name="dueDate" type="date" />
          </label>
          <button>Add</button>
        </form>
        <div class="filters" aria-label="Task filters">
          <label>
            Search
            <input data-testid="task-search" placeholder="Search tasks" />
          </label>
          <label>
            Status
            <select data-testid="status-filter">
              <option value="All">All</option>
              <option>Open</option>
              <option>In progress</option>
              <option>Blocked</option>
              <option>Done</option>
            </select>
          </label>
          <label>
            Priority
            <select data-testid="priority-filter">
              <option value="All">All</option>
              <option>High</option>
              <option>Medium</option>
              <option>Low</option>
            </select>
          </label>
        </div>
        <p role="status"></p>
        <div class="table-header">
          <p data-testid="task-summary">0 tasks shown</p>
          <p data-testid="task-page-summary">Page 1 of 1</p>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <caption>
              Task list
            </caption>
            <thead>
              <tr>
                <th scope="col">Task</th>
                <th scope="col">Assignee</th>
                <th scope="col">Priority</th>
                <th scope="col">Status</th>
                <th scope="col">Due</th>
                <th scope="col">Action</th>
              </tr>
            </thead>
            <tbody data-testid="task-list"></tbody>
          </table>
        </div>
        <div class="pagination" aria-label="Task pagination">
          <button type="button" data-testid="previous-page">Previous</button>
          <button type="button" data-testid="next-page">Next</button>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
